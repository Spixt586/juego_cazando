<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cazando 🐱</title>
  
  <!-- Fuente moderna recomendada -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  
  <link href="cazando.css" rel="stylesheet"/>
</head>

<body onload="iniciarJuego()">

  <h1>🐱 CAZANDO 🐱</h1>
  <p>¡Ayuda al gato a atrapar la comida!</p>

  <div class="contenedor">
    <canvas id="areaJuego" width="500" height="500"></canvas>
  </div>

  <div class="controles">
    <div class="controles-row">
      <button onclick="moverArriba();">⬆</button>
    </div>
    <div class="controles-row">
      <button onclick="moverIzquierda();">⬅</button>
      <button onclick="moverAbajo();">⬇</button>
      <button onclick="moverDerecha();">➡</button>
    </div>
    <button id="reiniciar" onclick="reiniciarJuego();">🔄 Reiniciar Juego</button>
  </div>

  <div class="panel">
    <span>
      <span class="stat-label">Puntos</span>
      <span class="stat-value" id="puntos">0</span>
    </span>
    <span>
      <span class="stat-label">Tiempo</span>
      <span class="stat-value" id="tiempo">40</span>
    </span>
  </div>

  <p id="mensaje"></p>

  <script src="cazando.js"></script>
  <script src="utils.js"></script>

</body>
</html>
